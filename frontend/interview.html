<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interview Agent</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
width:900px;
margin:40px auto;
}

.back{
text-decoration:none;
font-weight:bold;
color:#ff141b;
}

.card{
background:white;
padding:30px;
margin-top:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

select,textarea{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.output{
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:10px;
border:1px solid #ddd;
min-height:120px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="page">

<a href="index.html" class="back">
← Back to Dashboard
</a>

<div class="card">

<h1>🎤 AI Interview Agent</h1>

<p>Select Role</p>

<select id="role">

<option>Java Developer</option>
<option>Backend Developer</option>
<option>Frontend Developer</option>
<option>Full Stack Developer</option>
<option>Python Developer</option>

</select>

<button onclick="generateQuestion()">
Generate Question
</button>

<div id="question" class="output">
Interview question will appear here.
</div>

<textarea
id="answer"
rows="6"
placeholder="Write your answer here..."></textarea>

<button onclick="evaluateAnswer()">
Evaluate Answer
</button>

<div id="feedback" class="output">
Feedback will appear here.
</div>

</div>

</div>

<script>

let currentQuestion="";

async function generateQuestion(){

let role=document.getElementById("role").value;

document.getElementById("question").innerText="Generating question...";

try{

let response=await fetch("http://127.0.0.1:5000/interview",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

role:role,
action:"question"

})

});

let data=await response.json();

currentQuestion=data.question;

document.getElementById("question").innerText=currentQuestion;

}catch(error){

document.getElementById("question").innerText="Unable to connect to backend.";

}

}

async function evaluateAnswer(){

let answer=document.getElementById("answer").value;

if(answer==""){

alert("Write your answer first.");

return;

}

document.getElementById("feedback").innerText="Evaluating...";

try{

let response=await fetch("http://127.0.0.1:5000/interview",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"evaluate",

question:currentQuestion,

answer:answer

})

});

let data=await response.json();

document.getElementById("feedback").innerText=data.feedback;

}catch(error){

document.getElementById("feedback").innerText="Unable to connect to backend.";

}

}

</script>

</body>
</html>
